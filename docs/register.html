<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>保護者登録 | BLUE MOUSE</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <style>
    :root {
      --bm-coral: #f2906c;
      --bm-coral-dark: #e87e59;
      --bm-teal: #5ec1c6;
      --bm-yellow: #f5d24a;
      --bm-cream: #fffdf7;
      --bm-ink: 40, 30, 24;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: var(--bm-cream); color: rgb(var(--bm-ink)); min-height: 100vh; }

    /* HEADER */
    .header {
      background: rgb(var(--bm-ink)); padding: 0 24px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 2px 16px rgba(var(--bm-ink),0.3);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-left img { height: 36px; width: auto; display: block; }
    .header-title { font-size: 14px; color: rgba(255,255,255,0.4); }
    .back-link {
      color: rgba(255,255,255,0.45); font-size: 13px; text-decoration: none;
      padding: 7px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12);
      transition: background 0.2s;
    }
    .back-link:hover { background: rgba(255,255,255,0.08); color: white; }

    /* PROGRESS STEPS */
    .progress-wrap {
      background: white; border-bottom: 1px solid rgba(var(--bm-ink),0.06);
      padding: 20px 24px;
    }
    .progress-inner { max-width: 680px; margin: 0 auto; display: flex; align-items: center; gap: 0; }
    .step {
      display: flex; align-items: center; gap: 8px; flex: 1;
      position: relative;
    }
    .step:not(:last-child)::after {
      content: ''; position: absolute; left: calc(50% + 20px); right: calc(-50% + 20px);
      top: 18px; height: 2px; background: rgba(var(--bm-ink),0.1);
      z-index: 0;
    }
    .step.done:not(:last-child)::after { background: var(--bm-coral); }
    .step-inner { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; position: relative; z-index: 1; }
    .step-num {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
      background: rgba(var(--bm-ink),0.06);
      color: rgba(var(--bm-ink),0.3);
      border: 2px solid rgba(var(--bm-ink),0.1);
      transition: all 0.3s;
    }
    .step.active .step-num {
      background: var(--bm-coral); color: white;
      border-color: var(--bm-coral);
      box-shadow: 0 4px 14px rgba(242,144,108,0.4);
    }
    .step.done .step-num {
      background: rgba(242,144,108,0.15); color: var(--bm-coral-dark);
      border-color: rgba(242,144,108,0.4);
    }
    .step-label { font-size: 11px; font-weight: 600; color: rgba(var(--bm-ink),0.35); text-align: center; white-space: nowrap; }
    .step.active .step-label { color: var(--bm-coral-dark); }
    .step.done .step-label { color: rgba(var(--bm-ink),0.55); }

    /* CONTENT */
    .content { max-width: 680px; margin: 0 auto; padding: 32px 24px 60px; }

    /* SECTION CARD */
    .card {
      background: white; border-radius: 24px; padding: 32px;
      margin-bottom: 20px; box-shadow: 0 2px 16px rgba(var(--bm-ink),0.06);
      border: 1.5px solid rgba(var(--bm-ink),0.05);
    }
    .card-head {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 28px; padding-bottom: 20px;
      border-bottom: 1px solid rgba(var(--bm-ink),0.06);
    }
    .card-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .card-icon.coral { background: rgba(242,144,108,0.12); }
    .card-icon.teal  { background: rgba(94,193,198,0.12); }
    .card-icon.yellow{ background: rgba(245,210,74,0.15); }
    .card-title { font-size: 17px; font-weight: 800; color: rgb(var(--bm-ink)); }
    .card-subtitle { font-size: 13px; color: rgba(var(--bm-ink),0.45); margin-top: 2px; }

    /* FORM */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 0; }
    @media (max-width: 560px) { .form-row { grid-template-columns: 1fr; } }
    .form-group { margin-bottom: 20px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label { display: block; font-size: 12px; font-weight: 700; color: rgba(var(--bm-ink),0.45); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
    .required { color: var(--bm-coral); margin-left: 2px; }
    .form-input {
      width: 100%; padding: 13px 16px; border: 1.5px solid rgba(var(--bm-ink),0.1);
      border-radius: 12px; font-size: 15px; color: rgb(var(--bm-ink));
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      background: rgba(var(--bm-ink),0.02);
    }
    .form-input:focus { border-color: var(--bm-coral); box-shadow: 0 0 0 3px rgba(242,144,108,0.1); background: white; }
    .form-input::placeholder { color: rgba(var(--bm-ink),0.25); }

    /* PHOTO PAIR */
    .photo-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 560px) { .photo-pair { grid-template-columns: 1fr; } }

    .photo-slot { display: flex; flex-direction: column; gap: 10px; }
    .photo-slot-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 700; color: rgb(var(--bm-ink));
    }
    .photo-slot-badge {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px;
      letter-spacing: 0.5px;
    }
    .photo-slot-badge.coral { background: rgba(242,144,108,0.15); color: var(--bm-coral-dark); }
    .photo-slot-badge.teal  { background: rgba(94,193,198,0.15); color: #2e9da3; }

    .camera-box {
      background: rgb(var(--bm-ink)); border-radius: 16px; overflow: hidden;
      position: relative; aspect-ratio: 1/1; /* 正方形 */
      display: flex; align-items: center; justify-content: center;
    }
    .cam-placeholder { text-align: center; color: rgba(255,255,255,0.3); padding: 20px; }
    .cam-placeholder .icon { font-size: 36px; margin-bottom: 8px; }
    .cam-placeholder .text { font-size: 12px; line-height: 1.5; }
    .cam-video { width: 100%; height: 100%; object-fit: cover; display: none; }
    .cam-captured { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; border-radius: 16px; }

    /* 顔ガイド */
    .face-guide-wrap { display: none; flex-direction: column; align-items: center; gap: 8px; position: absolute; inset: 0; justify-content: center; pointer-events: none; }
    .face-guide { width: 130px; height: 160px; border: 2px dashed rgba(94,193,198,0.9); border-radius: 50%; animation: pulse-guide 2s ease-in-out infinite; }
    @keyframes pulse-guide { 0%,100%{ box-shadow: 0 0 12px rgba(94,193,198,0.2); } 50%{ box-shadow: 0 0 22px rgba(94,193,198,0.5); } }
    .face-guide-label { color: rgba(255,255,255,0.9); font-size: 11px; font-weight: 600; background: rgba(0,0,0,0.55); padding: 4px 12px; border-radius: 999px; }

    .cam-controls { display: flex; gap: 8px; }
    .btn { padding: 10px 16px; border-radius: 10px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: transform 0.1s, opacity 0.2s; flex: 1; }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }
    .btn-start  { background: rgba(var(--bm-ink),0.07); color: rgba(var(--bm-ink),0.65); }
    .btn-shoot  { background: linear-gradient(135deg, var(--bm-teal), #44aaaf); color: white; }
    .btn-retake { background: rgba(var(--bm-ink),0.07); color: rgba(var(--bm-ink),0.55); }
    .btn-upload { background: rgba(var(--bm-ink),0.05); color: rgba(var(--bm-ink),0.5); border: 1px dashed rgba(var(--bm-ink),0.15); font-size: 12px; }

    .status-inline {
      font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 8px;
      display: none; margin-top: 4px; text-align: center;
    }
    .status-inline.loading { background: #fef9c3; color: #854d0e; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .status-inline.success { background: rgba(94,193,198,0.12); color: #2e9da3; display: block; }
    .status-inline.error   { background: #fee2e2; color: #dc2626; display: block; }
    .mini-spin { width: 12px; height: 12px; border: 2px solid rgba(133,77,14,0.2); border-top-color: #854d0e; border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }

    /* SAVE BUTTON */
    .btn-save-wrap { position: sticky; bottom: 0; padding: 16px 0; background: linear-gradient(to top, var(--bm-cream) 70%, transparent); }
    .btn-save {
      width: 100%; padding: 18px; border-radius: 16px;
      background: linear-gradient(135deg, var(--bm-coral), var(--bm-coral-dark));
      color: white; font-size: 17px; font-weight: 800; border: none; cursor: pointer;
      box-shadow: 0 6px 24px rgba(242,144,108,0.38); transition: transform 0.1s, box-shadow 0.2s;
      letter-spacing: 0.03em;
    }
    .btn-save:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(242,144,108,0.48); }
    .btn-save:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    /* LOADING OVERLAY */
    #loadingOverlay {
      position: fixed; inset: 0; background: rgba(var(--bm-ink),0.88);
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; z-index: 999;
    }
    .loading-spinner { width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--bm-coral); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: rgba(255,255,255,0.45); font-size: 14px; }

    /* AUTH */
    #authScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, rgb(var(--bm-ink)), #3d2518);
    }
    .auth-box {
      background: rgba(255,255,255,0.07); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 24px;
      padding: 48px 40px; width: 360px; text-align: center;
    }
    .auth-input {
      width: 100%; padding: 13px 16px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08);
      color: var(--bm-cream); font-size: 15px; text-align: center;
      letter-spacing: 3px; outline: none; margin-bottom: 14px;
    }
    .auth-input:focus { border-color: var(--bm-coral); }
    .auth-btn {
      width: 100%; padding: 13px; border-radius: 10px;
      background: linear-gradient(135deg, var(--bm-coral), var(--bm-coral-dark));
      color: white; font-size: 15px; font-weight: 600; border: none; cursor: pointer;
    }
  </style>
</head>
<body>

<!-- 管理者認証（通常アクセス時のみ） -->
<div id="authScreen">
  <div class="auth-box">
    <div style="font-size:38px;margin-bottom:10px">🔐</div>
    <div style="font-size:18px;font-weight:700;color:var(--bm-coral);margin-bottom:4px">管理者認証</div>
    <div style="font-size:13px;color:rgba(255,255,255,0.38);margin-bottom:28px">保護者登録には管理者パスワードが必要です</div>
    <input type="password" class="auth-input" id="authInput" placeholder="管理者パスワード" onkeydown="if(event.key==='Enter')checkAuth()">
    <button class="auth-btn" onclick="checkAuth()">認証する</button>
    <div id="authError" style="color:#f87171;font-size:13px;margin-top:12px;display:none">パスワードが正しくありません</div>
    <div style="margin-top:20px"><a href="index.html" style="color:rgba(255,255,255,0.25);font-size:13px;text-decoration:none">← お迎え画面へ戻る</a></div>
  </div>
</div>

<div id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">顔認証モデルを読み込み中...</div>
</div>

<div id="mainContent" style="display:none">
  <div class="header">
    <div class="header-left">
      <a href="index.html"><img src="logo.webp" alt="BLUE MOUSE"></a>
      <span class="header-title">保護者登録</span>
    </div>
    <a href="index.html" class="back-link">← 戻る</a>
  </div>

  <!-- ステップバー -->
  <div class="progress-wrap">
    <div class="progress-inner">
      <div class="step active" id="step1">
        <div class="step-inner">
          <div class="step-num">1</div>
          <div class="step-label">基本情報</div>
        </div>
      </div>
      <div class="step" id="step2">
        <div class="step-inner">
          <div class="step-num">2</div>
          <div class="step-label">写真登録</div>
        </div>
      </div>
      <div class="step" id="step3">
        <div class="step-inner">
          <div class="step-num">3</div>
          <div class="step-label">完了</div>
        </div>
      </div>
    </div>
  </div>

  <div class="content">

    <!-- STEP 1: 基本情報 -->
    <div class="card">
      <div class="card-head">
        <div class="card-icon coral">👨‍👩‍👧</div>
        <div>
          <div class="card-title">基本情報</div>
          <div class="card-subtitle">保護者氏名とお子様の名前を入力してください</div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">保護者氏名<span class="required">*</span></label>
          <input type="text" class="form-input" id="inputName" placeholder="例：山田 花子" oninput="checkStep1()">
        </div>
        <div class="form-group">
          <label class="form-label">お子様の名前<span class="required">*</span></label>
          <input type="text" class="form-input" id="inputChildName" placeholder="例：山田 太郎" oninput="checkStep1()">
        </div>
      </div>
    </div>

    <!-- STEP 2: 写真 -->
    <div class="card">
      <div class="card-head">
        <div class="card-icon teal">📷</div>
        <div>
          <div class="card-title">写真登録</div>
          <div class="card-subtitle">保護者・お子様それぞれの写真を撮影してください</div>
        </div>
      </div>

      <div class="photo-pair">
        <!-- 保護者写真 -->
        <div class="photo-slot">
          <div class="photo-slot-label">
            👤 保護者様
            <span class="photo-slot-badge coral">顔認証あり</span>
          </div>
          <div class="camera-box" id="parentCameraBox">
            <div class="cam-placeholder" id="parentPlaceholder">
              <div class="icon">🧑</div>
              <div class="text">カメラを起動して<br>撮影してください</div>
            </div>
            <video class="cam-video" id="parentVideo" autoplay muted playsinline></video>
            <img class="cam-captured" id="parentCaptured" src="" alt="">
            <div class="face-guide-wrap" id="parentFaceGuide">
              <div class="face-guide"></div>
              <div class="face-guide-label">顔をここに合わせて</div>
            </div>
          </div>
          <div class="cam-controls">
            <button class="btn btn-start" id="btnParentStart" onclick="startCam('parent')">📷 カメラ起動</button>
            <button class="btn btn-shoot" id="btnParentShoot" onclick="shootCam('parent')" disabled>撮影</button>
          </div>
          <button class="btn btn-retake" id="btnParentRetake" onclick="retakeCam('parent')" style="display:none">↩ 撮り直し</button>
          <input type="file" id="parentUpload" accept="image/*" style="display:none" onchange="uploadPhoto(event,'parent')">
          <button class="btn btn-upload" onclick="document.getElementById('parentUpload').click()">📁 画像アップロード</button>
          <div class="status-inline" id="parentStatus"></div>
        </div>

        <!-- 子供写真 -->
        <div class="photo-slot">
          <div class="photo-slot-label">
            🧒 お子様
            <span class="photo-slot-badge teal">任意</span>
          </div>
          <div class="camera-box" id="childCameraBox">
            <div class="cam-placeholder" id="childPlaceholder">
              <div class="icon">👧</div>
              <div class="text">カメラを起動して<br>撮影してください</div>
            </div>
            <video class="cam-video" id="childVideo" autoplay muted playsinline></video>
            <img class="cam-captured" id="childCaptured" src="" alt="">
          </div>
          <div class="cam-controls">
            <button class="btn btn-start" id="btnChildStart" onclick="startCam('child')">📷 カメラ起動</button>
            <button class="btn btn-shoot" id="btnChildShoot" onclick="shootCam('child')" disabled>撮影</button>
          </div>
          <button class="btn btn-retake" id="btnChildRetake" onclick="retakeCam('child')" style="display:none">↩ 撮り直し</button>
          <input type="file" id="childUpload" accept="image/*" style="display:none" onchange="uploadPhoto(event,'child')">
          <button class="btn btn-upload" onclick="document.getElementById('childUpload').click()">📁 画像アップロード</button>
          <div class="status-inline" id="childStatus"></div>
        </div>
      </div>
    </div>

    <!-- 登録ボタン -->
    <div class="btn-save-wrap">
      <button class="btn-save" id="btnSave" onclick="saveParent()" disabled>登録する</button>
    </div>

  </div>
</div>

<script>
const ADMIN_PASSWORD = '0218bass';
const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights';
const firebaseConfig = {
  apiKey: "AIzaSyAxkP1UP8UQffk8PxMp1_PUKNYaqo63QfU",
  authDomain: "bluemouse-dfd31.firebaseapp.com",
  projectId: "bluemouse-dfd31",
  storageBucket: "bluemouse-dfd31.firebasestorage.app",
  messagingSenderId: "244172125496",
  appId: "1:244172125496:web:117e6c1aeeaa056ba2bdcd"
};

let db;
const state = {
  parent: { stream: null, photoB64: null, faceDescriptor: null },
  child:  { stream: null, photoB64: null }
};

// ?noauth=1 のときは認証スキップ
if (new URLSearchParams(location.search).get('noauth') === '1') {
  window.addEventListener('load', () => {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('loadingOverlay').style.display = 'flex';
    initApp();
  });
}

function checkAuth() {
  const pw = document.getElementById('authInput').value;
  if (pw === ADMIN_PASSWORD) {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('loadingOverlay').style.display = 'flex';
    initApp();
  } else {
    document.getElementById('authError').style.display = 'block';
    document.getElementById('authInput').value = '';
  }
}

async function initApp() {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  await waitForFaceApi();
  document.getElementById('loadingText').textContent = '顔認証モデルを読み込み中...';
  await Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
  ]);
  document.getElementById('loadingOverlay').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
}

function waitForFaceApi() {
  return new Promise(resolve => { const c = () => { if (window.faceapi) resolve(); else setTimeout(c, 100); }; c(); });
}

// ===== ステップ管理 =====
function checkStep1() {
  const ok = document.getElementById('inputName').value.trim() && document.getElementById('inputChildName').value.trim();
  document.getElementById('step1').classList.toggle('done', !!ok);
  document.getElementById('step2').classList.toggle('active', !!ok);
  updateSaveBtn();
}

function updateSaveBtn() {
  const name = document.getElementById('inputName').value.trim();
  const child = document.getElementById('inputChildName').value.trim();
  const hasParentFace = !!state.parent.faceDescriptor;
  const ok = name && child && hasParentFace;
  document.getElementById('btnSave').disabled = !ok;
  if (ok) {
    document.getElementById('step2').classList.add('done');
    document.getElementById('step3').classList.add('active');
  }
}

// ===== カメラ =====
async function startCam(who) {
  const videoEl = document.getElementById(`${who}Video`);
  const placeholderEl = document.getElementById(`${who}Placeholder`);
  const shootBtn = document.getElementById(`btn${cap(who)}Shoot`);
  const startBtn = document.getElementById(`btn${cap(who)}Start`);

  // 既存ストリーム停止
  if (state[who].stream) { state[who].stream.getTracks().forEach(t => t.stop()); }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
    state[who].stream = stream;
    videoEl.srcObject = stream; await videoEl.play();
    placeholderEl.style.display = 'none';
    videoEl.style.display = 'block';
    document.getElementById(`${who}Captured`).style.display = 'none';
    if (who === 'parent') document.getElementById('parentFaceGuide').style.display = 'flex';
    shootBtn.disabled = false;
    startBtn.style.display = 'none';
    document.getElementById(`btn${cap(who)}Retake`).style.display = 'none';
    setStatus(who, '');
  } catch(e) { alert('カメラにアクセスできません。ブラウザの設定でカメラを許可してください。'); }
}

async function shootCam(who) {
  const videoEl = document.getElementById(`${who}Video`);
  if (!videoEl.videoWidth) return;

  if (who === 'parent') {
    setStatus('parent', 'loading', '顔を解析中...');
    document.getElementById('btnParentShoot').disabled = true;
  }

  const canvas = document.createElement('canvas');
  canvas.width = videoEl.videoWidth; canvas.height = videoEl.videoHeight;
  canvas.getContext('2d').drawImage(videoEl, 0, 0);

  if (who === 'parent') {
    // 顔認証データ抽出
    let det;
    try { det = await faceapi.detectSingleFace(canvas, new faceapi.TinyFaceDetectorOptions({ inputSize: 416, scoreThreshold: 0.5 })).withFaceLandmarks().withFaceDescriptor(); } catch(e) {}
    if (!det) {
      setStatus('parent', 'error', '顔が検出できませんでした。正面を向いて再撮影してください。');
      document.getElementById('btnParentShoot').disabled = false;
      return;
    }
    const { photoB64, descriptor } = cropFace(canvas, det);
    state.parent.photoB64 = photoB64;
    state.parent.faceDescriptor = descriptor;
    setStatus('parent', 'success', '✓ 顔認証データ取得完了');
  } else {
    // 子供は中央クロップ（アスペクト比を保って正方形に）
    state.child.photoB64 = centerCrop(canvas, 300);
    setStatus('child', 'success', '✓ 写真撮影完了');
  }

  // カメラ停止・プレビュー表示
  stopStream(who);
  const capturedEl = document.getElementById(`${who}Captured`);
  capturedEl.src = who === 'parent' ? state.parent.photoB64 : state.child.photoB64;
  capturedEl.style.display = 'block';
  document.getElementById(`${who}Video`).style.display = 'none';
  if (who === 'parent') document.getElementById('parentFaceGuide').style.display = 'none';
  document.getElementById(`btn${cap(who)}Retake`).style.display = 'block';
  document.getElementById(`btn${cap(who)}Shoot`).style.display = 'none';
  document.getElementById(`btn${cap(who)}Start`).style.display = 'none';
  updateSaveBtn();
}

function retakeCam(who) {
  state[who].photoB64 = null;
  if (who === 'parent') state.parent.faceDescriptor = null;
  document.getElementById(`${who}Captured`).style.display = 'none';
  document.getElementById(`btn${cap(who)}Retake`).style.display = 'none';
  document.getElementById(`btn${cap(who)}Shoot`).style.display = 'block';
  document.getElementById(`btn${cap(who)}Start`).style.display = 'block';
  document.getElementById(`${who}Placeholder`).style.display = 'block';
  setStatus(who, '');
  updateSaveBtn();
  startCam(who);
}

function stopStream(who) {
  if (state[who].stream) { state[who].stream.getTracks().forEach(t => t.stop()); state[who].stream = null; }
}

// ===== アップロード =====
async function uploadPhoto(event, who) {
  const file = event.target.files[0]; if (!file) return;
  stopStream(who);
  document.getElementById(`${who}Video`).style.display = 'none';
  if (who === 'parent') document.getElementById('parentFaceGuide').style.display = 'none';
  document.getElementById(`${who}Placeholder`).style.display = 'none';
  setStatus(who, 'loading', '解析中...');
  state[who].photoB64 = null;
  if (who === 'parent') state.parent.faceDescriptor = null;
  updateSaveBtn();

  const img = await loadImageFile(file);
  const canvas = document.createElement('canvas');
  canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
  canvas.getContext('2d').drawImage(img, 0, 0);

  if (who === 'parent') {
    let det;
    try { det = await faceapi.detectSingleFace(canvas, new faceapi.TinyFaceDetectorOptions({ inputSize: 416, scoreThreshold: 0.4 })).withFaceLandmarks().withFaceDescriptor(); } catch(e) {}
    if (!det) {
      setStatus('parent', 'error', '顔が検出できませんでした。正面向きの写真を使ってください。');
      document.getElementById(`${who}Placeholder`).style.display = 'block';
      event.target.value = ''; return;
    }
    const { photoB64, descriptor } = cropFace(canvas, det);
    state.parent.photoB64 = photoB64; state.parent.faceDescriptor = descriptor;
    setStatus('parent', 'success', '✓ 顔認証データ取得完了');
    showCaptured('parent', photoB64);
  } else {
    state.child.photoB64 = centerCrop(canvas, 300);
    setStatus('child', 'success', '✓ 写真登録完了');
    showCaptured('child', state.child.photoB64);
  }
  event.target.value = '';
  updateSaveBtn();
}

function showCaptured(who, src) {
  const el = document.getElementById(`${who}Captured`);
  el.src = src; el.style.display = 'block';
  document.getElementById(`btn${cap(who)}Shoot`).style.display = 'none';
  document.getElementById(`btn${cap(who)}Start`).style.display = 'none';
  document.getElementById(`btn${cap(who)}Retake`).style.display = 'block';
}

function loadImageFile(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => { const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = e.target.result; };
    reader.readAsDataURL(file);
  });
}

function centerCrop(canvas, size) {
  const s = Math.min(canvas.width, canvas.height);
  const sx = (canvas.width - s) / 2;
  const sy = (canvas.height - s) / 2;
  const c2 = document.createElement('canvas'); c2.width = size; c2.height = size;
  c2.getContext('2d').drawImage(canvas, sx, sy, s, s, 0, 0, size, size);
  return c2.toDataURL('image/jpeg', 0.8);
}

function cropFace(canvas, det) {
  const face = det.detection.box;
  const sz = Math.min(Math.max(face.width, face.height) * 4.0, canvas.width, canvas.height);
  let cx = (face.x + face.width/2) - sz/2, cy = (face.y + face.height/2) - sz/2;
  cx = Math.max(0, Math.min(cx, canvas.width - sz));
  cy = Math.max(0, Math.min(cy, canvas.height - sz));
  const c2 = document.createElement('canvas'); c2.width=300; c2.height=300;
  c2.getContext('2d').drawImage(canvas, cx, cy, sz, sz, 0, 0, 300, 300);
  return { photoB64: c2.toDataURL('image/jpeg', 0.8), descriptor: Array.from(det.descriptor) };
}

// ===== ステータス =====
function setStatus(who, type, msg = '') {
  const el = document.getElementById(`${who}Status`);
  el.className = 'status-inline';
  if (!type) { el.style.display = 'none'; return; }
  if (type === 'loading') {
    el.classList.add('loading');
    el.innerHTML = `<div class="mini-spin"></div>${msg}`;
  } else if (type === 'success') {
    el.classList.add('success'); el.textContent = msg;
  } else if (type === 'error') {
    el.classList.add('error'); el.textContent = msg;
  }
}

// ===== 保存 =====
async function saveParent() {
  const name = document.getElementById('inputName').value.trim();
  const childName = document.getElementById('inputChildName').value.trim();
  if (!name || !childName || !state.parent.faceDescriptor) return;

  document.getElementById('btnSave').disabled = true;
  document.getElementById('btnSave').textContent = '登録中...';
  try {
    await db.collection('parents').add({
      name, childName,
      photoBase64: state.parent.photoB64,
      childPhotoBase64: state.child.photoB64 || null,
      faceDescriptor: state.parent.faceDescriptor,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    // 完了演出
    document.getElementById('step3').classList.add('active', 'done');
    document.getElementById('btnSave').textContent = '✓ 登録完了！';
    document.getElementById('btnSave').style.background = 'linear-gradient(135deg,#34d399,#059669)';
    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
  } catch(e) {
    console.error('登録エラー詳細:', e);
    let msg = e.message || '不明なエラー';
    if (e.code === 'permission-denied') {
      msg = 'Firestoreのアクセス権限がありません。\nFirebaseコンソールでルールを確認してください。\n\n【修正方法】\nFirebase Console → Firestore → ルール\n「allow read, write: if true;」に変更してください。';
    } else if (msg.includes('quota') || msg.includes('exceed')) {
      msg = 'データサイズが大きすぎます。写真を小さくして再試行してください。';
    }
    alert('登録に失敗しました\n\n' + msg);
    document.getElementById('btnSave').disabled = false;
    document.getElementById('btnSave').textContent = '登録する';
  }
}

function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
</script>
