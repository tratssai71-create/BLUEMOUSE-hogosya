<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>保護者登録 | BLUE MOUSE</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <style>
    :root {
      --bm-coral: #f2906c;
      --bm-coral-dark: #e87e59;
      --bm-teal: #5ec1c6;
      --bm-yellow: #f5d24a;
      --bm-cream: #fffdf7;
      --bm-ink: 40, 30, 24;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: var(--bm-cream); color: rgb(var(--bm-ink)); min-height: 100vh; }

    .header {
      background: rgb(var(--bm-ink)); color: white; padding: 0 24px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 12px rgba(var(--bm-ink),0.25);
    }
    .header-logo img { height: 42px; width: auto; }
    .header-title { font-size: 14px; color: rgba(255,255,255,0.4); margin-left: 12px; }
    .back-link {
      color: rgba(255,255,255,0.45); font-size: 13px; text-decoration: none;
      padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12);
      transition: background 0.2s, color 0.2s;
    }
    .back-link:hover { background: rgba(255,255,255,0.08); color: white; }

    .content { max-width: 680px; margin: 0 auto; padding: 32px 24px; }

    .card {
      background: white; border-radius: 20px; padding: 32px; margin-bottom: 20px;
      box-shadow: 0 1px 3px rgba(var(--bm-ink),0.07);
    }
    .card-title {
      font-size: 15px; font-weight: 700; color: rgb(var(--bm-ink));
      margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid rgba(var(--bm-ink),0.07);
      display: flex; align-items: center; gap: 8px;
    }

    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: rgba(var(--bm-ink),0.55); margin-bottom: 8px; }
    .required { color: var(--bm-coral); margin-left: 4px; }
    .form-input {
      width: 100%; padding: 12px 16px; border: 1.5px solid rgba(var(--bm-ink),0.1);
      border-radius: 10px; font-size: 15px; color: rgb(var(--bm-ink));
      outline: none; transition: border-color 0.2s, box-shadow 0.2s; background: rgba(var(--bm-ink),0.025);
    }
    .form-input:focus { border-color: var(--bm-coral); box-shadow: 0 0 0 3px rgba(242,144,108,0.12); background: white; }

    /* Camera */
    .camera-box {
      background: rgb(var(--bm-ink)); border-radius: 16px; overflow: hidden;
      position: relative; aspect-ratio: 4/3; margin-bottom: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .camera-placeholder { text-align: center; color: rgba(255,255,255,0.35); padding: 32px; }
    .camera-placeholder .icon { font-size: 48px; margin-bottom: 12px; }
    .camera-placeholder .text { font-size: 14px; }
    #regVideo { width: 100%; display: none; border-radius: 16px; }
    #capturedImg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; border-radius: 16px; }
    .camera-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .cam-corners { position: absolute; inset: 14px; }
    .corner { position: absolute; width: 22px; height: 22px; border-color: rgba(255,255,255,0.5); border-style: solid; }
    .corner.tl { top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0; }
    .corner.tr { top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0; }
    .corner.bl { bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px; }
    .corner.br { bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0; }
    .face-guide-wrap { display: none; flex-direction: column; align-items: center; gap: 12px; }
    .face-guide {
      width: 190px; height: 235px; border: 2px dashed rgba(94,193,198,0.9);
      border-radius: 50%; animation: pulse-guide 2s ease-in-out infinite; position: relative;
    }
    @keyframes pulse-guide {
      0%,100% { box-shadow: 0 0 16px rgba(94,193,198,0.2); border-color: rgba(94,193,198,0.9); }
      50%      { box-shadow: 0 0 28px rgba(94,193,198,0.5); border-color: rgba(94,193,198,1); }
    }
    .face-crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width:0; height:0; }
    .cross-h { position:absolute;width:28px;height:2px;background:rgba(255,255,255,0.7);top:0;left:0;transform:translate(-50%,-50%);border-radius:1px; }
    .cross-v { position:absolute;width:2px;height:28px;background:rgba(255,255,255,0.7);top:0;left:0;transform:translate(-50%,-50%);border-radius:1px; }
    .cross-dot { position:absolute;width:10px;height:10px;border-radius:50%;background:var(--bm-teal);border:2px solid white;top:0;left:0;transform:translate(-50%,-50%);box-shadow:0 0 6px rgba(94,193,198,0.8); }
    .face-guide-label { color:rgba(255,255,255,0.9);font-size:12px;font-weight:600;background:rgba(0,0,0,0.5);padding:5px 14px;border-radius:999px;letter-spacing:0.5px; }

    .camera-controls { display: flex; gap: 12px; margin-bottom: 16px; }
    .btn { padding: 11px 20px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }
    .btn-primary { background: linear-gradient(135deg, var(--bm-coral), var(--bm-coral-dark)); color: white; flex: 1; }
    .btn-secondary { background: rgba(var(--bm-ink),0.06); color: rgba(var(--bm-ink),0.6); flex: 1; }
    .btn-capture { background: linear-gradient(135deg, var(--bm-teal), #44aaaf); color: white; flex: 1; }

    .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background: rgba(var(--bm-ink),0.08); }
    .divider span { font-size: 12px; color: rgba(var(--bm-ink),0.35); white-space: nowrap; }

    .status-box { padding: 12px 16px; border-radius: 10px; font-size: 14px; font-weight: 500; margin-top: 12px; display: none; }
    .status-loading { background: #fef9c3; color: #854d0e; display: flex; align-items: center; gap: 8px; }
    .status-success { background: rgba(94,193,198,0.12); color: #2a8e93; border: 1px solid rgba(94,193,198,0.3); }
    .status-error { background: #fee2e2; color: #dc2626; }
    .spinner { width:16px;height:16px;border:2px solid rgba(133,77,14,0.2);border-top-color:#854d0e;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-save {
      width: 100%; padding: 16px; border-radius: 14px;
      background: linear-gradient(135deg, var(--bm-coral), var(--bm-coral-dark));
      color: white; font-size: 16px; font-weight: 700; border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(242,144,108,0.32); transition: transform 0.1s, opacity 0.2s;
    }
    .btn-save:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(242,144,108,0.42); }
    .btn-save:disabled { opacity: 0.35; cursor: not-allowed; }

    #loadingOverlay { position:fixed;inset:0;background:rgba(var(--bm-ink),0.88);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:999; }
    .loading-spinner { width:48px;height:48px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--bm-coral);border-radius:50%;animation:spin .8s linear infinite; }
    .loading-text { color:rgba(255,255,255,0.4);font-size:14px; }
  </style>
</head>
<body>

<!-- 管理者認証 -->
<div id="authScreen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,rgb(40,30,24),#3d2518)">
  <div style="background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:48px 40px;width:360px;text-align:center">
    <div style="font-size:40px;margin-bottom:8px">🔐</div>
    <div style="font-size:18px;font-weight:700;color:var(--bm-coral);margin-bottom:4px">管理者認証</div>
    <div style="font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:28px">保護者登録には管理者パスワードが必要です</div>
    <input type="password" id="authInput" placeholder="管理者パスワード"
      style="width:100%;padding:13px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:#fffdf7;font-size:15px;text-align:center;letter-spacing:3px;outline:none;margin-bottom:14px"
      onkeydown="if(event.key==='Enter')checkAuth()">
    <button onclick="checkAuth()" style="width:100%;padding:13px;border-radius:10px;background:linear-gradient(135deg,var(--bm-coral),var(--bm-coral-dark));color:white;font-size:15px;font-weight:600;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(242,144,108,0.35)">
      認証する
    </button>
    <div id="authError" style="color:#f87171;font-size:13px;margin-top:12px;display:none">パスワードが正しくありません</div>
    <div style="margin-top:20px"><a href="admin.html" style="color:rgba(255,255,255,0.3);font-size:13px;text-decoration:none">← 管理者ページへ戻る</a></div>
  </div>
</div>

<div id="loadingOverlay" style="display:none">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">顔認証モデルを読み込み中...</div>
</div>

<div id="mainContent" style="display:none">
  <div class="header">
    <div style="display:flex;align-items:center;gap:12px">
      <a href="index.html"><img src="logo.webp" alt="BLUE MOUSE" style="height:42px;width:auto;display:block;"></a>
      <span class="header-title">保護者登録</span>
    </div>
    <a href="admin.html" class="back-link">← 管理者ページへ</a>
  </div>

  <div class="content">
    <div class="card">
      <div class="card-title">👤 保護者情報</div>
      <div class="form-group">
        <label class="form-label">保護者氏名<span class="required">*</span></label>
        <input type="text" class="form-input" id="inputName" placeholder="例：山田 花子">
      </div>
      <div class="form-group">
        <label class="form-label">お子様の名前<span class="required">*</span></label>
        <input type="text" class="form-input" id="inputChildName" placeholder="例：山田 太郎">
      </div>
    </div>

    <div class="card">
      <div class="card-title">📷 顔写真・顔認証データの登録</div>
      <p style="font-size:13px;color:rgba(40,30,24,0.45);margin-bottom:16px">
        カメラで撮影するか、スマホで撮った写真をアップロードしてください。<br>
        顔が正面を向いている写真を使うと精度が上がります。
      </p>
      <div class="camera-box" id="cameraBox">
        <div class="camera-placeholder" id="cameraPlaceholder">
          <div class="icon">📷</div>
          <div class="text">「カメラを起動」を押して撮影してください</div>
        </div>
        <video id="regVideo" autoplay muted playsinline></video>
        <img id="capturedImg" src="" alt="撮影した写真">
        <div class="camera-overlay">
          <div class="cam-corners">
            <span class="corner tl"></span><span class="corner tr"></span>
            <span class="corner bl"></span><span class="corner br"></span>
          </div>
          <div class="face-guide-wrap" id="faceGuide">
            <div class="face-guide">
              <div class="face-crosshair">
                <div class="cross-h"></div><div class="cross-v"></div><div class="cross-dot"></div>
              </div>
            </div>
            <div class="face-guide-label">🔴 鼻をここに合わせてください</div>
          </div>
        </div>
      </div>
      <div class="camera-controls">
        <button class="btn btn-primary" id="btnStartCamera" onclick="startCamera()">📷 カメラを起動</button>
        <button class="btn btn-capture" id="btnCapture" onclick="capturePhoto()" disabled>✓ 撮影する</button>
        <button class="btn btn-secondary" id="btnRetake" onclick="retakePhoto()" style="display:none">↩ 撮り直し</button>
      </div>
      <div class="divider"><span>または</span></div>
      <input type="file" id="photoUploadInput" accept="image/*" style="display:none" onchange="uploadPhoto(event)">
      <button class="btn btn-secondary" style="width:100%;margin-bottom:16px" onclick="document.getElementById('photoUploadInput').click()">
        📁 写真をアップロード（スマホ撮影など）
      </button>
      <div class="status-box status-loading" id="statusLoading"><div class="spinner"></div><span id="statusLoadingText">顔を解析中...</span></div>
      <div class="status-box status-success" id="statusSuccess">✓ 顔認証データの取得が完了しました！</div>
      <div class="status-box status-error" id="statusError">顔が検出できませんでした。明るい場所で正面を向いて撮影してください。</div>
    </div>

    <button class="btn-save" id="btnSave" onclick="saveParent()" disabled>保護者を登録する</button>
  </div>
</div>

<script>
const ADMIN_PASSWORD = '0218bass';
const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights';
const firebaseConfig = {
  apiKey: "AIzaSyAxkP1UP8UQffk8PxMp1_PUKNYaqo63QfU",
  authDomain: "bluemouse-dfd31.firebaseapp.com",
  projectId: "bluemouse-dfd31",
  storageBucket: "bluemouse-dfd31.firebasestorage.app",
  messagingSenderId: "244172125496",
  appId: "1:244172125496:web:117e6c1aeeaa056ba2bdcd"
};

let db, videoStream = null, faceDescriptor = null, photoBase64 = null;

function checkAuth() {
  const pw = document.getElementById('authInput').value;
  if (pw === ADMIN_PASSWORD) {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('loadingOverlay').style.display = 'flex';
    initApp();
  } else {
    document.getElementById('authError').style.display = 'block';
    document.getElementById('authInput').value = '';
  }
}

async function initApp() {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  await waitForFaceApi();
  await Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
  ]);
  document.getElementById('loadingOverlay').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
}

function waitForFaceApi() {
  return new Promise(resolve => { const c = () => { if (window.faceapi) resolve(); else setTimeout(c, 100); }; c(); });
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
    videoStream = stream;
    const v = document.getElementById('regVideo'); v.srcObject = stream; await v.play();
    document.getElementById('cameraPlaceholder').style.display = 'none';
    document.getElementById('capturedImg').style.display = 'none';
    v.style.display = 'block';
    document.getElementById('faceGuide').style.display = 'flex';
    document.getElementById('btnStartCamera').style.display = 'none';
    document.getElementById('btnCapture').disabled = false;
    document.getElementById('btnRetake').style.display = 'none';
    hideStatus(); faceDescriptor = null; photoBase64 = null;
    document.getElementById('btnSave').disabled = true;
  } catch(e) { alert('カメラにアクセスできません。\nブラウザの設定でカメラを許可してください。'); }
}

async function capturePhoto() {
  const v = document.getElementById('regVideo');
  if (!v.videoWidth) return;
  showStatus('loading', '顔を検出・解析中...');
  document.getElementById('btnCapture').disabled = true;
  const canvas = document.createElement('canvas');
  canvas.width = v.videoWidth; canvas.height = v.videoHeight;
  canvas.getContext('2d').drawImage(v, 0, 0);
  let det;
  try { det = await faceapi.detectSingleFace(canvas, new faceapi.TinyFaceDetectorOptions({ inputSize: 416, scoreThreshold: 0.5 })).withFaceLandmarks().withFaceDescriptor(); } catch(e) {}
  if (!det) { showStatus('error', '顔が検出できませんでした。正面を向いて再撮影してください。'); document.getElementById('btnCapture').disabled = false; return; }
  const r = cropFace(canvas, det);
  photoBase64 = r.photoB64; faceDescriptor = r.descriptor;
  const img = document.getElementById('capturedImg');
  img.src = photoBase64; img.style.display = 'block';
  v.style.display = 'none'; document.getElementById('faceGuide').style.display = 'none';
  if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
  document.getElementById('btnRetake').style.display = 'block';
  document.getElementById('btnCapture').style.display = 'none';
  document.getElementById('btnStartCamera').style.display = 'none';
  showStatus('success', ''); document.getElementById('btnSave').disabled = false;
}

function cropFace(canvas, det) {
  const face = det.detection.box;
  const sz = Math.min(Math.max(face.width, face.height) * 4.0, canvas.width, canvas.height);
  let cx = (face.x + face.width/2) - sz/2, cy = (face.y + face.height/2) - sz/2;
  cx = Math.max(0, Math.min(cx, canvas.width - sz));
  cy = Math.max(0, Math.min(cy, canvas.height - sz));
  const c2 = document.createElement('canvas'); c2.width = 300; c2.height = 300;
  c2.getContext('2d').drawImage(canvas, cx, cy, sz, sz, 0, 0, 300, 300);
  return { photoB64: c2.toDataURL('image/jpeg', 0.8), descriptor: Array.from(det.descriptor) };
}

function retakePhoto() {
  document.getElementById('capturedImg').style.display = 'none'; document.getElementById('capturedImg').src = '';
  document.getElementById('btnRetake').style.display = 'none';
  document.getElementById('btnCapture').style.display = 'block'; document.getElementById('btnCapture').disabled = false;
  document.getElementById('btnStartCamera').style.display = 'block';
  faceDescriptor = null; photoBase64 = null; document.getElementById('btnSave').disabled = true;
  hideStatus(); startCamera();
}

async function uploadPhoto(event) {
  const file = event.target.files[0]; if (!file) return;
  if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
  document.getElementById('regVideo').style.display = 'none';
  document.getElementById('faceGuide').style.display = 'none';
  document.getElementById('cameraPlaceholder').style.display = 'none';
  showStatus('loading', '顔を検出・解析中...');
  faceDescriptor = null; photoBase64 = null; document.getElementById('btnSave').disabled = true;
  const img = await new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => { const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = e.target.result; };
    reader.readAsDataURL(file);
  });
  const canvas = document.createElement('canvas');
  canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
  canvas.getContext('2d').drawImage(img, 0, 0);
  let det;
  try { det = await faceapi.detectSingleFace(canvas, new faceapi.TinyFaceDetectorOptions({ inputSize: 416, scoreThreshold: 0.4 })).withFaceLandmarks().withFaceDescriptor(); } catch(e) {}
  if (!det) {
    showStatus('error', '顔が検出できませんでした。顔が正面を向いている写真を使ってください。');
    document.getElementById('btnStartCamera').style.display = 'block';
    document.getElementById('btnCapture').style.display = 'block';
    document.getElementById('cameraPlaceholder').style.display = 'block';
    event.target.value = ''; return;
  }
  const r = cropFace(canvas, det);
  photoBase64 = r.photoB64; faceDescriptor = r.descriptor;
  const ci = document.getElementById('capturedImg');
  ci.src = photoBase64; ci.style.display = 'block';
  document.getElementById('btnRetake').style.display = 'block';
  document.getElementById('btnCapture').style.display = 'none';
  document.getElementById('btnStartCamera').style.display = 'none';
  showStatus('success', ''); document.getElementById('btnSave').disabled = false;
  event.target.value = '';
}

function showStatus(type, msg) {
  hideStatus();
  if (type === 'loading') { document.getElementById('statusLoadingText').textContent = msg; document.getElementById('statusLoading').style.display = 'flex'; }
  else if (type === 'success') { document.getElementById('statusSuccess').style.display = 'block'; }
  else if (type === 'error') { document.getElementById('statusError').textContent = msg; document.getElementById('statusError').style.display = 'block'; }
}
function hideStatus() {
  ['statusLoading','statusSuccess','statusError'].forEach(id => document.getElementById(id).style.display = 'none');
}

async function saveParent() {
  const name = document.getElementById('inputName').value.trim();
  const childName = document.getElementById('inputChildName').value.trim();
  if (!name) { alert('保護者氏名を入力してください'); return; }
  if (!childName) { alert('お子様の名前を入力してください'); return; }
  if (!faceDescriptor) { alert('顔写真を撮影してください'); return; }
  document.getElementById('btnSave').disabled = true;
  document.getElementById('btnSave').textContent = '登録中...';
  try {
    await db.collection('parents').add({ name, childName, photoBase64, faceDescriptor, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    alert(`✓ ${name}さんを登録しました！`);
    window.location.href = 'admin.html';
  } catch(e) {
    alert('登録に失敗しました: ' + e.message);
    document.getElementById('btnSave').disabled = false;
    document.getElementById('btnSave').textContent = '保護者を登録する';
  }
}
</script>
</body>
</html>
