<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者ページ | BLUE MOUSE お迎え記録</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --bm-coral: #f2906c;
      --bm-coral-dark: #e87e59;
      --bm-teal: #5ec1c6;
      --bm-yellow: #f5d24a;
      --bm-cream: #fffdf7;
      --bm-ink: 40, 30, 24;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: var(--bm-cream); color: rgb(var(--bm-ink)); min-height: 100vh; }

    /* LOGIN */
    #loginScreen {
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
      background: linear-gradient(135deg, rgb(var(--bm-ink)) 0%, #3d2518 100%);
    }
    .login-box {
      background: rgba(255,255,255,0.07); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 24px;
      padding: 48px 40px; width: 380px; text-align: center;
    }
    .login-box img { width: 160px; height: auto; margin-bottom: 16px; }
    .login-subtitle { font-size: 13px; color: rgba(255,255,255,0.38); margin: 6px 0 28px; }
    .login-input {
      width: 100%; padding: 14px 18px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08);
      color: var(--bm-cream); font-size: 16px; margin-bottom: 16px;
      text-align: center; letter-spacing: 4px; outline: none; transition: border-color 0.2s;
    }
    .login-input:focus { border-color: var(--bm-coral); }
    .login-input::placeholder { letter-spacing: 1px; color: rgba(255,255,255,0.25); }
    .login-btn {
      width: 100%; padding: 14px; border-radius: 12px;
      background: linear-gradient(135deg, var(--bm-coral), var(--bm-coral-dark));
      color: white; font-size: 16px; font-weight: 600; border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(242,144,108,0.38);
    }
    .login-error { color: #f87171; font-size: 13px; margin-top: 12px; display: none; }

    /* ADMIN SIDEBAR */
    .admin-sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; width: 200px;
      background: rgba(var(--bm-ink), 0.98);
      border-right: 1px solid rgba(255,255,255,0.08);
      padding: 20px 0; z-index: 40;
      display: none; flex-direction: column;
    }
    .admin-sidebar.show { display: flex; }
    .asb-logo { padding: 0 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 8px; }
    .asb-logo img { width: 100px; height: auto; display: block; }
    .asb-logo .sub { font-size: 10px; color: rgba(255,255,255,0.28); margin-top: 4px; }
    .asb-link { display: flex; align-items: center; gap: 10px; padding: 11px 16px; color: rgba(255,255,255,0.5); text-decoration: none; font-size: 13px; transition: background 0.2s, color 0.2s; border-left: 3px solid transparent; }
    .asb-link:hover { background: rgba(255,255,255,0.05); color: white; }
    .asb-link.active { background: rgba(255,255,255,0.08); color: white; border-left-color: var(--bm-coral); }
    .asb-link .icon { font-size: 16px; }
    .asb-divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 8px 0; }
    .asb-logout { margin-top: auto; padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.07); }
    .asb-logout-btn { width: 100%; padding: 8px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); font-size: 12px; cursor: pointer; transition: background 0.2s; }
    .asb-logout-btn:hover { background: rgba(255,255,255,0.1); color: white; }

    /* HEADER */
    #mainApp { display: none; }
    .header {
      background: rgb(var(--bm-ink)); color: white; padding: 0 24px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50; box-shadow: 0 2px 12px rgba(var(--bm-ink),0.3);
      margin-left: 200px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo img { height: 42px; width: auto; }
    .header-title { font-size: 14px; color: rgba(255,255,255,0.38); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .btn-add {
      background: linear-gradient(135deg, var(--bm-coral), var(--bm-coral-dark));
      color: white; border: none; padding: 8px 18px; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none;
      box-shadow: 0 2px 10px rgba(242,144,108,0.3);
    }
    .btn-logout {
      background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.45);
      border: 1px solid rgba(255,255,255,0.1); padding: 8px 14px;
      border-radius: 8px; font-size: 13px; cursor: pointer; transition: background 0.2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.12); color: white; }

    /* CONTENT */
    .content { max-width: 1100px; margin: 0 auto; padding: 32px 24px; margin-left: 200px; }
    .section-title { font-size: 12px; font-weight: 700; color: rgba(var(--bm-ink),0.38); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; }

    /* PARENT GRID */
    .parent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .parent-card {
      background: white; border-radius: 18px; padding: 24px 16px; text-align: center;
      box-shadow: 0 1px 3px rgba(var(--bm-ink),0.07); border: 2px solid transparent;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .parent-card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(var(--bm-ink),0.1); border-color: var(--bm-coral); }
    .parent-card-photo { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(var(--bm-ink),0.08); margin: 0 auto 12px; display: block; }
    .parent-card-name { font-size: 15px; font-weight: 700; color: rgb(var(--bm-ink)); margin-bottom: 4px; }
    .parent-card-child { font-size: 12px; color: rgba(var(--bm-ink),0.45); margin-bottom: 12px; }
    .btn-delete-parent { background: none; border: none; color: rgba(var(--bm-ink),0.2); font-size: 13px; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: color 0.2s; }
    .btn-delete-parent:hover { color: #ef4444; }
    .empty-state { text-align: center; padding: 60px 20px; color: rgba(var(--bm-ink),0.35); }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }

    /* WEEKLY SUMMARY */
    .summary-section { margin-top: 52px; }
    .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .section-header-title { font-size: 13px; font-weight: 700; color: rgb(var(--bm-ink)); }
    .week-nav { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .week-label { font-size: 14px; font-weight: 700; color: rgb(var(--bm-ink)); min-width: 150px; text-align: center; }
    .week-btn {
      background: white; border: 1.5px solid rgba(var(--bm-ink),0.1);
      border-radius: 8px; width: 32px; height: 32px; font-size: 13px; cursor: pointer;
      color: rgba(var(--bm-ink),0.5); transition: background 0.2s, border-color 0.2s;
    }
    .week-btn:hover { background: rgba(var(--bm-ink),0.05); border-color: rgba(var(--bm-ink),0.2); }
    .week-today-btn {
      font-size: 12px; padding: 6px 12px; border-radius: 6px;
      background: rgba(242,144,108,0.1); border: 1px solid rgba(242,144,108,0.3);
      color: var(--bm-coral-dark); cursor: pointer; font-weight: 600; transition: background 0.2s;
    }
    .week-today-btn:hover { background: rgba(242,144,108,0.18); }

    .table-wrap { overflow-x: auto; border-radius: 16px; box-shadow: 0 1px 4px rgba(var(--bm-ink),0.07); }
    .summary-table { width: 100%; border-collapse: collapse; background: white; min-width: 560px; }
    .summary-table thead tr { background: rgba(var(--bm-ink),0.025); }
    .th-name { text-align: left; padding: 12px 16px; font-size: 11px; font-weight: 700; color: rgba(var(--bm-ink),0.4); border-bottom: 1.5px solid rgba(var(--bm-ink),0.07); white-space: nowrap; min-width: 140px; position: sticky; left: 0; background: rgba(var(--bm-ink),0.025); z-index: 2; }
    .th-day { padding: 10px 6px; font-size: 11px; font-weight: 700; color: rgba(var(--bm-ink),0.4); border-bottom: 1.5px solid rgba(var(--bm-ink),0.07); text-align: center; white-space: nowrap; min-width: 72px; }
    .th-day.today { background: rgba(242,144,108,0.07); color: var(--bm-coral-dark); }
    .th-day.sun { color: #e05555; }
    .th-day.sat { color: #3b82f6; }
    .td-name { padding: 10px 16px; border-bottom: 1px solid rgba(var(--bm-ink),0.05); position: sticky; left: 0; background: white; z-index: 1; }
    .staff-inner { display: flex; align-items: center; gap: 10px; }
    .staff-photo-sm { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .staff-name-sm { font-size: 13px; font-weight: 600; color: rgb(var(--bm-ink)); white-space: nowrap; }
    .staff-child-sm { font-size: 11px; color: rgba(var(--bm-ink),0.4); }
    .td-day { padding: 8px 4px; text-align: center; border-bottom: 1px solid rgba(var(--bm-ink),0.05); vertical-align: middle; }
    .td-day.today { background: rgba(242,144,108,0.04); }
    .pickup-badge { font-size: 11px; font-weight: 700; color: var(--bm-coral-dark); background: rgba(242,144,108,0.12); border: 1px solid rgba(242,144,108,0.25); padding: 3px 8px; border-radius: 6px; display: inline-block; white-space: nowrap; }
    .empty-cell { color: rgba(var(--bm-ink),0.15); font-size: 14px; }
    .summary-table tbody tr:hover .td-name,
    .summary-table tbody tr:hover .td-day { background: rgba(var(--bm-ink),0.02); }

    /* HISTORY */
    .history-section { margin-top: 52px; margin-bottom: 52px; }
    .history-filter { display: flex; gap: 8px; margin-left: auto; }
    .filter-input { padding: 7px 12px; border: 1.5px solid rgba(var(--bm-ink),0.1); border-radius: 8px; font-size: 13px; color: rgb(var(--bm-ink)); outline: none; background: white; transition: border-color 0.2s; }
    .filter-input:focus { border-color: var(--bm-coral); }
    .history-table-wrap { border-radius: 16px; overflow: hidden; box-shadow: 0 1px 4px rgba(var(--bm-ink),0.07); }
    .history-table { width: 100%; border-collapse: collapse; background: white; }
    .history-table th { background: rgba(var(--bm-ink),0.025); padding: 12px 16px; font-size: 11px; font-weight: 700; color: rgba(var(--bm-ink),0.4); text-align: left; border-bottom: 1.5px solid rgba(var(--bm-ink),0.07); }
    .history-table td { padding: 12px 16px; border-bottom: 1px solid rgba(var(--bm-ink),0.05); font-size: 13px; vertical-align: middle; }
    .history-table tr:last-child td { border-bottom: none; }
    .history-table tr:hover td { background: rgba(var(--bm-ink),0.02); }
    .rec-photo { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; cursor: zoom-in; }
    .rec-parent { font-weight: 700; color: rgb(var(--bm-ink)); }
    .rec-child { color: rgba(var(--bm-ink),0.45); font-size: 12px; margin-top: 2px; }
    .rec-time { font-size: 15px; font-weight: 700; color: rgb(var(--bm-ink)); }
    .rec-date { font-size: 11px; color: rgba(var(--bm-ink),0.38); margin-top: 2px; }
    .btn-rec-delete { background: none; border: none; color: rgba(var(--bm-ink),0.2); font-size: 14px; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: color 0.2s; }
    .btn-rec-delete:hover { color: #ef4444; }
    .history-empty { text-align: center; padding: 40px; color: rgba(var(--bm-ink),0.3); background: white; font-size: 14px; }

    /* PHOTO FULLSCREEN */
    #photoFullModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 400; align-items: center; justify-content: center; cursor: zoom-out; }
    #photoFullModal.show { display: flex; }
    #photoFullImg { max-width: 90vw; max-height: 90vh; border-radius: 8px; object-fit: contain; }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <img src="logo.webp" alt="BLUE MOUSE">
    <div class="login-subtitle">管理者ページ — お迎え記録システム</div>
    <input type="password" class="login-input" id="adminPassword" placeholder="管理者パスワード" onkeydown="if(event.key==='Enter')adminLogin()">
    <button class="login-btn" onclick="adminLogin()">ログイン</button>
    <div class="login-error" id="loginError">パスワードが正しくありません</div>
    <div style="margin-top:20px"><a href="index.html" style="color:rgba(255,255,255,0.28);font-size:13px;text-decoration:none">← お迎え画面に戻る</a></div>
  </div>
</div>

<div id="mainApp">
  <!-- 左サイドバー -->
  <div class="admin-sidebar show" id="adminSidebar">
    <div class="asb-logo">
      <img src="logo.webp" alt="BLUE MOUSE">
      <div class="sub">管理メニュー</div>
    </div>
    <a href="index.html" class="asb-link"><span class="icon">🏠</span> お迎え画面</a>
    <a href="parents.html" class="asb-link"><span class="icon">👥</span> 保護者一覧</a>
    <a href="calendar.html" class="asb-link"><span class="icon">📅</span> カレンダー</a>
    <hr class="asb-divider">
    <a href="register.html" class="asb-link"><span class="icon">➕</span> 保護者を追加</a>
    <a href="admin.html" class="asb-link active"><span class="icon">⚙️</span> 管理者ページ</a>
    <div class="asb-logout">
      <button class="asb-logout-btn" onclick="adminLogout()">🚪 ログアウト</button>
    </div>
  </div>

  <div class="header">
    <div class="header-left">
      <span class="header-title">⚙️ 管理者ページ</span>
    </div>
    <div class="header-right">
      <a href="register.html" class="btn-add">＋ 保護者追加</a>
    </div>
  </div>

  <div class="content">
    <div class="section-title">保護者一覧</div>
    <div class="parent-grid" id="parentGrid">
      <div class="empty-state"><div class="icon">⏳</div><div>読み込み中...</div></div>
    </div>

    <div class="summary-section">
      <div class="section-header">
        <div class="section-header-title">週別お迎えサマリー</div>
        <div class="week-nav">
          <button class="week-btn" onclick="weekPrev()">◀</button>
          <span class="week-label" id="weekLabel">–</span>
          <button class="week-btn" onclick="weekNext()">▶</button>
          <button class="week-today-btn" onclick="weekThis()">今週</button>
        </div>
      </div>
      <div class="table-wrap">
        <div id="summaryContainer" style="text-align:center;padding:40px;color:rgba(40,30,24,0.3);background:white;border-radius:16px">読み込み中...</div>
      </div>
    </div>

    <div class="history-section">
      <div class="section-header">
        <div class="section-header-title">お迎え履歴</div>
        <div class="history-filter">
          <input type="date" class="filter-input" id="filterDate">
          <input type="text" class="filter-input" id="filterName" placeholder="名前で絞り込み" style="width:150px">
        </div>
      </div>
      <div class="history-table-wrap">
        <div id="historyContainer"><div class="history-empty">読み込み中...</div></div>
      </div>
    </div>
  </div>
</div>

<div id="photoFullModal" onclick="closePhotoFull()">
  <img id="photoFullImg" src="" alt="">
</div>

<script>
const ADMIN_PASSWORD = '0218bass';
const firebaseConfig = {
  apiKey: "AIzaSyAxkP1UP8UQffk8PxMp1_PUKNYaqo63QfU",
  authDomain: "bluemouse-dfd31.firebaseapp.com",
  projectId: "bluemouse-dfd31",
  storageBucket: "bluemouse-dfd31.firebasestorage.app",
  messagingSenderId: "244172125496",
  appId: "1:244172125496:web:117e6c1aeeaa056ba2bdcd"
};

let db, parentList = [], allRecords = [], weekStart = getWeekStart(new Date());

window.addEventListener('load', () => {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
});

function adminLogin() {
  const pw = document.getElementById('adminPassword').value;
  if (pw === ADMIN_PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('adminPassword').value = '';
  }
}
function adminLogout() {
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminPassword').value = '';
  document.getElementById('loginError').style.display = 'none';
}

async function loadAll() {
  await loadParentList();
  loadWeekSummary();
  loadHistory();
  document.getElementById('filterDate').addEventListener('input', renderHistory);
  document.getElementById('filterName').addEventListener('input', renderHistory);
}

async function loadParentList() {
  const grid = document.getElementById('parentGrid');
  const snap = await db.collection('parents').get();
  parentList = [];
  if (snap.empty) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">👥</div><div>保護者が登録されていません<br><a href="register.html" style="color:var(--bm-coral)">＋ 保護者を追加する</a></div></div>';
    return;
  }
  grid.innerHTML = '';
  snap.forEach(doc => {
    const d = doc.data();
    parentList.push({ id: doc.id, name: d.name, childName: d.childName || '', photo: d.photoBase64 || '' });
    const card = document.createElement('div');
    card.className = 'parent-card';
    card.innerHTML = `
      <img class="parent-card-photo" src="${d.photoBase64 || generateAvatar(d.name)}" alt="${d.name}">
      <div class="parent-card-name">${d.name}</div>
      <div class="parent-card-child">${d.childName ? 'お子様：' + d.childName : ''}</div>
      <button class="btn-delete-parent" onclick="deleteParent('${doc.id}','${d.name}',event)">🗑 削除</button>`;
    grid.appendChild(card);
  });
}

async function deleteParent(id, name, e) {
  e.stopPropagation();
  if (!confirm(`${name}さんを削除しますか？`)) return;
  await db.collection('parents').doc(id).delete();
  loadParentList();
}

function generateAvatar(name) {
  const c = name ? name.charAt(0) : '?';
  return `data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="%23f2906c"/><text x="50" y="65" text-anchor="middle" font-size="40" fill="%23fffdf7">${encodeURIComponent(c)}</text></svg>`;
}

/* ===== 週別サマリー ===== */
function getWeekStart(date) {
  const d = new Date(date), day = d.getDay();
  d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
  d.setHours(0,0,0,0); return d;
}

async function loadWeekSummary() {
  const container = document.getElementById('summaryContainer');
  container.innerHTML = '<div style="padding:32px;text-align:center;color:rgba(40,30,24,0.3)">読み込み中...</div>';
  const days = Array.from({length:7}, (_,i) => { const d=new Date(weekStart); d.setDate(d.getDate()+i); return d; });
  const d0=days[0], d6=days[6];
  document.getElementById('weekLabel').textContent = `${d0.getMonth()+1}/${d0.getDate()} 〜 ${d6.getMonth()+1}/${d6.getDate()}`;
  const weekEnd = new Date(days[6]); weekEnd.setHours(23,59,59,999);
  let records = [];
  try {
    const snap = await db.collection('pickupRecords')
      .where('timestamp','>=', firebase.firestore.Timestamp.fromDate(weekStart))
      .where('timestamp','<=', firebase.firestore.Timestamp.fromDate(weekEnd)).get();
    snap.forEach(doc => records.push({id:doc.id,...doc.data()}));
  } catch(e) { container.innerHTML = '<div style="padding:32px;text-align:center;color:#ef4444">読み込みに失敗しました</div>'; return; }

  const data = {};
  records.forEach(r => {
    if (!r.timestamp || !r.parentId) return;
    const jst = new Date(r.timestamp.toDate().toLocaleString('en-US',{timeZone:'Asia/Tokyo'}));
    const key = `${jst.getFullYear()}-${jst.getMonth()+1}-${jst.getDate()}`;
    const hm = `${String(jst.getHours()).padStart(2,'0')}:${String(jst.getMinutes()).padStart(2,'0')}`;
    if (!data[r.parentId]) data[r.parentId] = {};
    if (!data[r.parentId][key]) data[r.parentId][key] = [];
    data[r.parentId][key].push(hm);
  });

  const today = new Date(), todayKey = `${today.getFullYear()}-${today.getMonth()+1}-${today.getDate()}`;
  const dayNames = ['日','月','火','水','木','金','土'];
  let html = '<table class="summary-table"><thead><tr><th class="th-name">保護者</th>';
  days.forEach(d => {
    const key = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`, dow = d.getDay();
    const cls = [key===todayKey?'today':'', dow===0?'sun':'', dow===6?'sat':''].filter(Boolean).join(' ');
    html += `<th class="th-day ${cls}">${d.getMonth()+1}/${d.getDate()}<br><span style="font-size:10px;font-weight:500">${dayNames[dow]}</span></th>`;
  });
  html += '</tr></thead><tbody>';
  if (!parentList.length) {
    html += `<tr><td colspan="8" style="text-align:center;padding:40px;color:rgba(40,30,24,0.3)">保護者が登録されていません</td></tr>`;
  } else {
    parentList.forEach(p => {
      html += '<tr>';
      html += `<td class="td-name"><div class="staff-inner">
        <img src="${p.photo||generateAvatar(p.name)}" class="staff-photo-sm" alt="">
        <div><div class="staff-name-sm">${p.name}</div><div class="staff-child-sm">${p.childName}</div></div>
      </div></td>`;
      days.forEach(d => {
        const key = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`, isToday = key===todayKey;
        const times = data[p.id]?.[key];
        html += `<td class="td-day ${isToday?'today':''}">`;
        if (times?.length) times.forEach(t => { html += `<div class="pickup-badge">🏠 ${t}</div>`; });
        else html += `<span class="empty-cell">–</span>`;
        html += '</td>';
      });
      html += '</tr>';
    });
  }
  html += '</tbody></table>';
  container.innerHTML = html;
}

function weekPrev() { weekStart=new Date(weekStart); weekStart.setDate(weekStart.getDate()-7); loadWeekSummary(); }
function weekNext() { weekStart=new Date(weekStart); weekStart.setDate(weekStart.getDate()+7); loadWeekSummary(); }
function weekThis() { weekStart=getWeekStart(new Date()); loadWeekSummary(); }

/* ===== お迎え履歴 ===== */
async function loadHistory() {
  try {
    const snap = await db.collection('pickupRecords').orderBy('timestamp','desc').limit(200).get();
    allRecords = [];
    snap.forEach(doc => allRecords.push({id:doc.id,...doc.data()}));
  } catch(e) { allRecords = []; }
  renderHistory();
}

function renderHistory() {
  const fDate = document.getElementById('filterDate').value;
  const fName = document.getElementById('filterName').value.trim().toLowerCase();
  let records = allRecords;
  if (fDate) records = records.filter(r => {
    if (!r.timestamp) return false;
    const jst = new Date(r.timestamp.toDate().toLocaleString('en-US',{timeZone:'Asia/Tokyo'}));
    const d = `${jst.getFullYear()}-${String(jst.getMonth()+1).padStart(2,'0')}-${String(jst.getDate()).padStart(2,'0')}`;
    return d === fDate;
  });
  if (fName) records = records.filter(r => (r.parentName||'').toLowerCase().includes(fName) || (r.childName||'').toLowerCase().includes(fName));

  const container = document.getElementById('historyContainer');
  if (!records.length) { container.innerHTML = '<div class="history-empty">お迎え記録がありません</div>'; return; }

  let html = `<table class="history-table">
    <thead><tr><th>写真</th><th>保護者 / お子様</th><th>時刻</th><th></th></tr></thead><tbody>`;
  records.forEach(r => {
    let dateStr='–', timeStr='–';
    if (r.timestamp) {
      const jst = new Date(r.timestamp.toDate().toLocaleString('en-US',{timeZone:'Asia/Tokyo'}));
      const pad = n => String(n).padStart(2,'0');
      dateStr = `${jst.getFullYear()}/${pad(jst.getMonth()+1)}/${pad(jst.getDate())}`;
      timeStr = `${pad(jst.getHours())}:${pad(jst.getMinutes())}`;
    }
    const photoHtml = r.photoBase64
      ? `<img class="rec-photo" src="${r.photoBase64}" alt="" onclick="openPhotoFull('${r.photoBase64}')">`
      : `<div style="width:44px;height:44px;border-radius:10px;background:rgba(242,144,108,0.1);display:flex;align-items:center;justify-content:center;font-size:20px">👤</div>`;
    html += `<tr>
      <td>${photoHtml}</td>
      <td><div class="rec-parent">${r.parentName||'–'}</div><div class="rec-child">${r.childName?'お子様：'+r.childName:''}</div></td>
      <td><div class="rec-time">${timeStr}</div><div class="rec-date">${dateStr}</div></td>
      <td><button class="btn-rec-delete" onclick="deleteRecord('${r.id}',this)">🗑</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

async function deleteRecord(id, btn) {
  if (!confirm('この記録を削除しますか？')) return;
  try {
    await db.collection('pickupRecords').doc(id).delete();
    allRecords = allRecords.filter(r => r.id !== id);
    renderHistory();
  } catch(e) { alert('削除に失敗しました'); }
}

function openPhotoFull(src) { document.getElementById('photoFullImg').src=src; document.getElementById('photoFullModal').classList.add('show'); }
function closePhotoFull() { document.getElementById('photoFullModal').classList.remove('show'); }
</script>
