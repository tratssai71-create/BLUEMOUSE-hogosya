<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お迎え記録 | BLUE MOUSE</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.14/dist/face-api.js"></script>
  <style>
    :root {
      --bm-coral: #f2906c;
      --bm-coral-dark: #e87e59;
      --bm-teal: #5ec1c6;
      --bm-yellow: #f5d24a;
      --bm-cream: #fffdf7;
      --bm-ink: 40, 30, 24;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: var(--bm-cream); color: rgb(var(--bm-ink)); min-height: 100vh; }

    /* Sidebar */
    #sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; width: 220px;
      background: rgba(var(--bm-ink), 0.97); backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255,255,255,0.08);
      padding: 24px 0; transform: translateX(-220px); transition: transform 0.3s ease; z-index: 100;
    }
    #sidebar.open { transform: translateX(0); }
    .sidebar-logo { padding: 0 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .sidebar-logo img { width: 110px; height: auto; }
    .sidebar-logo .sub { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 4px; }
    .sidebar-nav { padding: 16px 0; }
    .sidebar-link { display: flex; align-items: center; gap: 10px; padding: 12px 20px; color: rgba(255,255,255,0.5); text-decoration: none; font-size: 14px; transition: background 0.2s, color 0.2s; cursor: pointer; }
    .sidebar-link:hover { background: rgba(255,255,255,0.05); color: white; }
    .sidebar-link .icon { font-size: 17px; }
    #sidebarOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
    #sidebarOverlay.show { display: block; }

    /* Topbar */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; height: 56px;
      background: rgba(var(--bm-ink), 0.97);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; padding: 0 16px; z-index: 50;
    }
    .menu-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; padding: 8px; border-radius: 8px; transition: background 0.2s; }
    .menu-btn:hover { background: rgba(255,255,255,0.1); }
    .topbar-logo { height: 34px; width: auto; margin-left: 12px; display: block; }
    .topbar a { display: flex; align-items: center; line-height: 0; }

    /* Clock Screen */
    #clockScreen { padding-top: 56px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; background: var(--bm-cream); }
    .clock-time-section { text-align: center; padding: 32px 20px 24px; }
    .clock-time { font-size: 56px; font-weight: 300; letter-spacing: 4px; color: rgb(var(--bm-ink)); }
    .clock-date { font-size: 14px; color: rgba(var(--bm-ink), 0.5); margin-top: 6px; }

    .camera-wrapper { position: relative; width: min(400px, 90vw); border-radius: 20px; overflow: hidden; background: rgba(var(--bm-ink),1); box-shadow: 0 4px 32px rgba(var(--bm-ink),0.18); }
    #video { width: 100%; display: block; border-radius: 18px; }
    #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .camera-status { text-align: center; padding: 10px 16px; font-size: 13px; color: rgba(255,255,255,0.5); background: rgba(0,0,0,0.45); }
    .face-detecting { color: var(--bm-yellow); }
    .face-recognized { color: var(--bm-teal); }

    #profileCard {
      display: none; width: min(400px, 90vw); background: white;
      border: 1.5px solid rgba(var(--bm-ink),0.08); border-radius: 18px; padding: 16px; margin-top: 16px;
      flex-direction: row; align-items: center; gap: 16px;
      box-shadow: 0 2px 16px rgba(var(--bm-ink),0.08); animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    #parentPhotoEl { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; border: 2.5px solid var(--bm-coral); flex-shrink: 0; }
    .profile-info { flex: 1; }
    .profile-name { font-size: 18px; font-weight: 700; color: rgb(var(--bm-ink)); }
    .profile-child { font-size: 13px; color: rgba(var(--bm-ink),0.5); margin-top: 2px; }
    .auth-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(94,193,198,0.12); border: 1px solid rgba(94,193,198,0.35); color: #3aa8ae; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; margin-top: 6px; }

    .action-buttons { display: flex; width: min(400px, 90vw); margin-top: 16px; }
    .btn-pickup {
      flex: 1; padding: 22px; border-radius: 16px; border: none;
      font-size: 20px; font-weight: 700; cursor: pointer; letter-spacing: 0.03em;
      background: linear-gradient(135deg, var(--bm-coral), var(--bm-coral-dark));
      color: white; box-shadow: 0 4px 20px rgba(242,144,108,0.38);
      transition: transform 0.1s, opacity 0.2s, box-shadow 0.2s;
    }
    .btn-pickup:disabled { opacity: 0.22; cursor: not-allowed; transform: none !important; }
    .btn-pickup:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(242,144,108,0.48); }
    .btn-pickup:not(:disabled):active { transform: translateY(0); }

    .add-parent-link {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 16px; margin-bottom: 40px;
      padding: 10px 20px; border-radius: 10px;
      background: rgba(94,193,198,0.12); border: 1px solid rgba(94,193,198,0.28);
      color: #3aa8ae; font-size: 14px; font-weight: 600; text-decoration: none;
      transition: background 0.2s;
    }
    .add-parent-link:hover { background: rgba(94,193,198,0.22); }

    /* Thanks Screen */
    #thanksScreen {
      display: none; min-height: 100vh; align-items: center; justify-content: center;
      flex-direction: column; text-align: center; padding: 40px 20px;
      background: rgb(var(--bm-ink)); position: relative; overflow: hidden;
    }
    #thanksScreen::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 38%, rgba(94,193,198,0.22) 0%, transparent 62%);
      pointer-events: none;
    }
    .thanks-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; letter-spacing: 2px; padding: 6px 18px; border-radius: 999px; margin-bottom: 32px; background: rgba(94,193,198,0.15); border: 1px solid rgba(94,193,198,0.4); color: var(--bm-teal); text-transform: uppercase; }
    .thanks-photo-wrap { position: relative; width: 148px; height: 148px; margin: 0 auto 28px; }
    .thanks-photo { width: 136px; height: 136px; border-radius: 50%; object-fit: cover; border: 4px solid rgba(255,255,255,0.15); position: absolute; top: 6px; left: 6px; }
    .thanks-ring { position: absolute; inset: 0; border-radius: 50%; border: 2px solid rgba(94,193,198,0.65); animation: ring-expand 2s ease-out infinite; }
    @keyframes ring-expand { 0%{transform:scale(.88);opacity:0} 30%{opacity:1} 100%{transform:scale(1.12);opacity:0} }
    .thanks-name { font-size: 32px; font-weight: 800; color: var(--bm-cream); margin-bottom: 6px; }
    .thanks-child { font-size: 15px; color: rgba(255,255,255,0.45); margin-bottom: 10px; }
    .thanks-message { font-size: 17px; color: rgba(255,255,255,0.55); margin-bottom: 28px; font-weight: 500; }
    .thanks-time { font-size: 13px; color: rgba(255,255,255,0.28); letter-spacing: 0.5px; }
    .thanks-bar { width: 180px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 36px; overflow: hidden; }
    .thanks-bar-fill { height: 100%; width: 0%; background: var(--bm-teal); border-radius: 2px; transition: width 5s linear; }

    /* Loading */
    #loadingOverlay { position: fixed; inset: 0; background: rgb(var(--bm-ink)); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; z-index: 999; }
    .loading-spinner { width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--bm-coral); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">起動中...</div>
</div>

<div id="sidebarOverlay" onclick="closeSidebar()"></div>
<div id="sidebar">
  <div class="sidebar-logo">
    <img src="logo.webp" alt="BLUE MOUSE">
    <div class="sub">お迎え記録システム</div>
  </div>
  <nav class="sidebar-nav">
    <span class="sidebar-link" onclick="closeSidebar()"><span class="icon">🏠</span> お迎え画面</span>
    <a href="admin.html" class="sidebar-link"><span class="icon">📋</span> 管理者ページ</a>
    <a href="register.html?noauth=1" class="sidebar-link"><span class="icon">👤</span> 保護者を追加</a>
  </nav>
</div>

<div class="topbar">
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <a href="index.html"><img src="logo.webp" alt="BLUE MOUSE" class="topbar-logo"></a>
</div>

<!-- お迎え画面 -->
<div id="clockScreen">
  <div class="clock-time-section">
    <div class="clock-time" id="clockTime">--:--:--</div>
    <div class="clock-date" id="clockDate"></div>
  </div>
  <div class="camera-wrapper">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
    <div class="camera-status" id="cameraStatus">カメラを起動中...</div>
  </div>
  <div id="profileCard">
    <img id="parentPhotoEl" src="" alt="">
    <div class="profile-info">
      <div class="profile-name" id="parentNameEl"></div>
      <div class="profile-child" id="childNameEl"></div>
      <div class="auth-badge">✓ 顔認証完了</div>
    </div>
  </div>
  <div class="action-buttons">
    <button class="btn-pickup" id="btnPickup" disabled onclick="recordPickup()">お迎え完了</button>
  </div>
  <a href="register.html?noauth=1" class="add-parent-link">＋ 保護者様を追加する</a>
</div>

<!-- サンクス画面 -->
<div id="thanksScreen">
  <div class="thanks-badge">✓ &nbsp;お迎え記録完了</div>
  <div class="thanks-photo-wrap">
    <div class="thanks-ring"></div>
    <img class="thanks-photo" id="thanksPhoto" src="" alt="">
  </div>
  <div class="thanks-name" id="thanksName"></div>
  <div class="thanks-child" id="thanksChild"></div>
  <div class="thanks-message">お迎えありがとうございます！</div>
  <div class="thanks-time" id="thanksTime"></div>
  <div class="thanks-bar"><div class="thanks-bar-fill" id="thanksBar"></div></div>
</div>

<script>
const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights';
const firebaseConfig = {
  apiKey: "AIzaSyAxkP1UP8UQffk8PxMp1_PUKNYaqo63QfU",
  authDomain: "bluemouse-dfd31.firebaseapp.com",
  projectId: "bluemouse-dfd31",
  storageBucket: "bluemouse-dfd31.firebasestorage.app",
  messagingSenderId: "244172125496",
  appId: "1:244172125496:web:117e6c1aeeaa056ba2bdcd"
};

let db, currentParent = null, labeledDescriptors = [], detectionTimer = null, videoStream = null, lastFaceTime = 0;

window.addEventListener('load', async () => {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  startClock('clockTime', 'clockDate');
  document.getElementById('loadingText').textContent = '顔認証モデルを読み込み中...';
  await waitForFaceApi();
  try {
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
      faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
    ]);
  } catch(e) { console.error(e); }
  document.getElementById('loadingOverlay').style.display = 'none';
  startCamera();
});

function waitForFaceApi() {
  return new Promise(resolve => { const c = () => { if (window.faceapi) resolve(); else setTimeout(c, 100); }; c(); });
}

function startClock(tId, dId) {
  const update = () => {
    const jst = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
    const pad = n => String(n).padStart(2,'0');
    const tEl = document.getElementById(tId), dEl = document.getElementById(dId);
    if (tEl) tEl.textContent = `${pad(jst.getHours())}:${pad(jst.getMinutes())}:${pad(jst.getSeconds())}`;
    if (dEl) { const days=['日','月','火','水','木','金','土']; dEl.textContent = `${jst.getFullYear()}年${jst.getMonth()+1}月${jst.getDate()}日（${days[jst.getDay()]}）`; }
  };
  update(); setInterval(update, 1000);
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('show'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); }

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
    videoStream = stream;
    const v = document.getElementById('video'); v.srcObject = stream; await v.play();
    setStatus('保護者の顔をカメラに向けてください', 'detecting');
    await loadParentDescriptors(); startDetection();
  } catch(e) { setStatus('カメラにアクセスできません', ''); }
}

async function loadParentDescriptors() {
  const snap = await db.collection('parents').get();
  labeledDescriptors = [];
  snap.forEach(doc => { const d = doc.data(); if (d.faceDescriptor?.length) labeledDescriptors.push({ id: doc.id, name: d.name, childName: d.childName || '', photo: d.photoBase64 || '', descriptor: new Float32Array(d.faceDescriptor) }); });
}

function startDetection() {
  const v = document.getElementById('video');
  detectionTimer = setInterval(async () => {
    if (!v.videoWidth) return;
    const det = await faceapi.detectSingleFace(v, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 })).withFaceLandmarks().withFaceDescriptor();
    if (!det) { if (currentParent && Date.now() - lastFaceTime > 1500) hideProfile(); if (!currentParent) setStatus('保護者の顔をカメラに向けてください', 'detecting'); return; }
    lastFaceTime = Date.now();
    if (!labeledDescriptors.length) { setStatus('保護者が未登録です', ''); return; }
    let best = null, bd = Infinity;
    for (const p of labeledDescriptors) { const d = faceapi.euclideanDistance(det.descriptor, p.descriptor); if (d < bd) { bd = d; best = p; } }
    if (bd < 0.5) { if (!currentParent || currentParent.id !== best.id) showProfile(best); }
    else { if (currentParent) hideProfile(); setStatus('登録されていない方です', 'detecting'); }
  }, 600);
}

function setStatus(msg, cls) {
  const el = document.getElementById('cameraStatus');
  el.textContent = msg; el.className = 'camera-status';
  if (cls === 'recognized') el.classList.add('face-recognized');
  if (cls === 'detecting') el.classList.add('face-detecting');
}

function showProfile(parent) {
  currentParent = parent;
  document.getElementById('parentNameEl').textContent = parent.name;
  document.getElementById('childNameEl').textContent = parent.childName ? `お子様：${parent.childName}` : '';
  document.getElementById('parentPhotoEl').src = parent.photo || generateAvatar(parent.name);
  document.getElementById('profileCard').style.display = 'flex';
  document.getElementById('btnPickup').disabled = false;
  setStatus(`✓ ${parent.name}さんを認証しました`, 'recognized');
}

function hideProfile() {
  currentParent = null;
  document.getElementById('profileCard').style.display = 'none';
  document.getElementById('btnPickup').disabled = true;
}

function generateAvatar(name) {
  const c = name ? name.charAt(0) : '?';
  return `data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="%23f2906c"/><text x="50" y="65" text-anchor="middle" font-size="40" fill="%23fffdf7">${encodeURIComponent(c)}</text></svg>`;
}

async function recordPickup() {
  if (!currentParent) return;
  const parent = { ...currentParent };
  document.getElementById('btnPickup').disabled = true;
  const photo = capturePhoto();
  const jst = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
  await db.collection('pickupRecords').add({ parentId: parent.id, parentName: parent.name, childName: parent.childName || '', timestamp: firebase.firestore.FieldValue.serverTimestamp(), photoBase64: photo });
  showThanks(parent, jst);
}

function capturePhoto() {
  const v = document.getElementById('video');
  const c = document.createElement('canvas'); const W=320, H=240; c.width=W; c.height=H;
  const ctx = c.getContext('2d'), s = Math.min(W/v.videoWidth, H/v.videoHeight), w=v.videoWidth*s, h=v.videoHeight*s;
  ctx.drawImage(v, (W-w)/2, (H-h)/2, w, h);
  return c.toDataURL('image/jpeg', 0.4);
}

function showThanks(parent, time) {
  if (detectionTimer) { clearInterval(detectionTimer); detectionTimer = null; }
  document.getElementById('clockScreen').style.display = 'none';
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('thanksName').textContent = parent.name + ' さん';
  document.getElementById('thanksChild').textContent = parent.childName ? `お子様：${parent.childName}` : '';
  document.getElementById('thanksPhoto').src = parent.photo || generateAvatar(parent.name);
  document.getElementById('thanksTime').textContent = `お迎え時刻：${pad(time.getHours())}:${pad(time.getMinutes())}`;
  document.getElementById('thanksScreen').style.display = 'flex';
  setTimeout(() => document.getElementById('thanksBar').style.width = '100%', 100);
  setTimeout(returnToClock, 5000);
}

async function returnToClock() {
  document.getElementById('thanksScreen').style.display = 'none';
  document.getElementById('thanksBar').style.width = '0%';
  document.getElementById('clockScreen').style.display = 'flex';
  hideProfile(); setStatus('保護者の顔をカメラに向けてください', 'detecting');
  await loadParentDescriptors(); startDetection();
}
</script>
</body>
</html>
